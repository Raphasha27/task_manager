name: Continuous Integration

on:
  workflow_dispatch:

  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint:
    name: Lint (HTML/JS)
    runs-on:
  workflow_dispatch:
 ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version:
  workflow_dispatch:
 '20'
      - name: Check Syntax
        run: npx -y htmlhint index.html

  security_scan:
    name: Security Scan (Trivy)
    needs: lint
    runs-on:
  workflow_dispatch:
 ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

